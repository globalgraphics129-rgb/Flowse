name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm install --no-audit --no-fund

      - name: Compile Web Assets
        run: |
          npm run build > vite_build.log 2>&1 || (cat vite_build.log && exit 1)
          cat vite_build.log

      - name: Sync Capacitor Plugins and Assets
        run: |
          npx cap sync > cap_sync.log 2>&1 || (cat cap_sync.log && exit 1)
          cat cap_sync.log

      - name: Set up Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug > gradle_build.log 2>&1 || (cat gradle_build.log && exit 1)
          cat gradle_build.log

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Flowse-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Push Pastebin URLs to debug-logs branch on Failure
        if: failure()
        run: |
          echo "## 🔍 Build Failure Pastebin Logs" > log_url.txt
          
          if [ -f vite_build.log ]; then
            echo "### 📦 Vite Build Log" >> log_url.txt
            curl -s --data-binary @vite_build.log https://paste.rs >> log_url.txt
            echo "" >> log_url.txt
          fi
          
          if [ -f cap_sync.log ]; then
            echo "### 🔄 Capacitor Sync Log" >> log_url.txt
            curl -s --data-binary @cap_sync.log https://paste.rs >> log_url.txt
            echo "" >> log_url.txt
          fi
          
          if [ -f android/gradle_build.log ]; then
            echo "### 🤖 Gradle Build Log" >> log_url.txt
            curl -s --data-binary @android/gradle_build.log https://paste.rs >> log_url.txt
            echo "" >> log_url.txt
          fi
          
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git checkout -b debug-logs || (git fetch origin debug-logs && git checkout debug-logs)
          git add log_url.txt || true
          git commit -m "debug: dump log URLs on failure" || true
          git push -f origin debug-logs
