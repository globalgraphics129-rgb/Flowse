name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm install --no-audit --no-fund

      - name: Compile Web Assets
        run: |
          npm run build > vite_build.log 2>&1 || (cat vite_build.log && exit 1)
          cat vite_build.log

      - name: Sync Capacitor Plugins and Assets
        run: |
          npx cap sync --verbose > cap_sync.log 2>&1 || (cat cap_sync.log && exit 1)
          cat cap_sync.log

      - name: Set up Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug > gradle_build.log 2>&1 || (cat gradle_build.log && exit 1)
          cat gradle_build.log

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Flowse-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Failure-Logs
          path: |
            vite_build.log
            cap_sync.log
            android/gradle_build.log

      - name: Push Logs to debug-logs branch on Failure
        if: failure()
        run: |
          mkdir -p /tmp/debug-logs
          cp vite_build.log /tmp/debug-logs/vite_build.log.txt || true
          cp cap_sync.log /tmp/debug-logs/cap_sync.log.txt || true
          cp android/gradle_build.log /tmp/debug-logs/gradle_build.log.txt || true
          
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          git checkout -b debug-logs || (git fetch origin debug-logs && git checkout debug-logs)
          
          cp /tmp/debug-logs/* . || true
          git add vite_build.log.txt cap_sync.log.txt gradle_build.log.txt || true
          git commit -m "debug: dump logs on failure" || true
          git push -f origin debug-logs
