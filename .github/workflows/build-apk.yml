name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm install --no-audit --no-fund

      - name: Compile Web Assets
        run: |
          npm run build > vite_build.log 2>&1 || (cat vite_build.log && exit 1)
          cat vite_build.log

      - name: Sync Capacitor Plugins and Assets
        run: |
          npx cap sync --verbose > cap_sync.log 2>&1 || (cat cap_sync.log && exit 1)
          cat cap_sync.log

      - name: Set up Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug > gradle_build.log 2>&1 || (cat gradle_build.log && exit 1)
          cat gradle_build.log

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Flowse-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Write Logs to Job Summary on Failure
        if: failure()
        run: |
          echo "## 🔍 Build Failure Logs" >> $GITHUB_STEP_SUMMARY
          
          if [ -f vite_build.log ]; then
            echo "### 📦 Vite Build Log" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat vite_build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f cap_sync.log ]; then
            echo "### 🔄 Capacitor Sync Log" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat cap_sync.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f android/gradle_build.log ]; then
            echo "### 🤖 Gradle Build Log" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat android/gradle_build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
